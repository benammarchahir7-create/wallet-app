<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="tikit" />
    <meta name="description" content="Votre portefeuille de tickets numérique" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Apple Touch Icon (icône sur l'écran d'accueil iOS) -->
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Splash screens iOS (optionnel mais recommandé) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <title>tikit</title>
  </head>
  <body>
    <noscript>Vous devez activer JavaScript pour utiliser tikit.</noscript>
    <div id="root"></div>

    <!-- Enregistrement du Service Worker -->
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js")
            .then(() => console.log("tikit SW registered"))
            .catch((err) => console.log("SW error:", err));
        });
      }
    </script>
  </body>
</html>
